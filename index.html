<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cool WebGL Portfolio</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #111;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }

        #ui {
            position: absolute;
            top: 30px;
            left: 40px;
            pointer-events: none;
        }

        h1 {
            margin: 0 0 10px 0;
            font-size: 2.5rem;
            letter-spacing: 2px;
            color: #00dc82;
        }

        p {
            margin: 5px 0;
            font-size: 1.2rem;
            color: #aaa;
        }

        span {
            color: #fff;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="ui">
        <h1>PORTFOLIO</h1>
        <p>X: <span id="mouseX">0</span> | Y: <span id="mouseY">0</span></p>
        <p>Status: <span id="mouseState">Resting</span></p>
    </div>

    <canvas id="glcanvas"></canvas>

    <script src="fluidsim.js"></script>
</body>
</html>
